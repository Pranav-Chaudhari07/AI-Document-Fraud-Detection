<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocSecure - Upload Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Upload Page Styles */
        .upload-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
        }

        /* Outer Upload Container */
        .upload-container {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            background: rgba(13, 31, 54, 0.4);
            transition: border-color 0.3s ease;
        }

        .upload-container:hover {
            border-color: rgba(59, 130, 246, 0.3);
        }

        /* Dashed Drop Zone */
        .drop-zone {
            border: 2px dashed rgba(148, 163, 184, 0.3);
            border-radius: 12px;
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: transparent;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--blue-bright);
            background: rgba(37, 99, 235, 0.05);
        }

        .drop-zone.drag-over {
            transform: scale(1.01);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.1);
        }

        /* Upload Icon */
        .upload-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }

        .upload-icon svg {
            width: 48px;
            height: 48px;
            stroke: var(--text-secondary);
            stroke-width: 1.5;
            fill: none;
            transition: stroke 0.3s ease, transform 0.3s ease;
        }

        .drop-zone:hover .upload-icon svg {
            stroke: var(--text-primary);
            transform: translateY(-4px);
        }

        /* Text */
        .drop-zone-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .drop-zone-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        /* Select File Button */
        .select-file-btn {
            background: var(--blue-bright);
            color: white;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .select-file-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
        }

        .select-file-btn:active {
            transform: translateY(0);
        }

        /* File Selected State */
        .file-info {
            display: none;
            margin-top: 1.5rem;
            padding: 1rem 1.5rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 10px;
            text-align: left;
        }

        .file-info.visible {
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideUp 0.3s ease;
        }

        .file-info-icon {
            width: 40px;
            height: 40px;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .file-info-details {
            flex: 1;
            min-width: 0;
        }

        .file-info-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-info-size {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .file-remove-btn {
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .file-remove-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }

        /* Analyze Button */
        .analyze-btn {
            display: none;
            margin-top: 1.5rem;
            width: 100%;
            background: linear-gradient(135deg, var(--blue-bright), #2563eb);
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .analyze-btn.visible {
            display: block;
            animation: slideUp 0.3s ease;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        .analyze-btn:active {
            transform: translateY(0);
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .upload-page {
            animation: fadeIn 0.4s ease;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .upload-page {
                padding: 1rem;
            }

            .drop-zone {
                padding: 3rem 1.5rem;
            }

            .upload-container {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <a href="index.html" class="logo">
            <div class="logo-icon">◇</div>
            <span>DocSecure</span>
        </a>
        <nav>
            <a href="#results">Results</a>
            <a href="#admin">Admin</a>
        </nav>
    </header>

    <!-- Upload Page Content -->
    <main>
        <div class="upload-page">

            <!-- Back Link -->
            <a href="index.html" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5"></path>
                    <path d="M12 19l-7-7 7-7"></path>
                </svg>
                Back
            </a>

            <!-- Upload Container -->
            <div class="upload-container">

                <!-- Drop Zone -->
                <div class="drop-zone" id="dropZone">

                    <!-- Upload Arrow Icon -->
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>

                    <p class="drop-zone-title">Drop your document here</p>
                    <p class="drop-zone-subtitle">or click to browse. Supports PDF and images (JPG, PNG, etc.)</p>

                    <button class="select-file-btn" id="selectFileBtn">Select File</button>

                    <!-- Hidden file input -->
                    <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.bmp,.tiff,.webp"
                        style="display:none;">
                </div>

                <!-- File Info (shown after selection) -->
                <div class="file-info" id="fileInfo">
                    <div class="file-info-icon">📄</div>
                    <div class="file-info-details">
                        <div class="file-info-name" id="fileName">document.pdf</div>
                        <div class="file-info-size" id="fileSize">2.4 MB</div>
                    </div>
                    <button class="file-remove-btn" id="removeFileBtn" title="Remove file">✕</button>
                </div>

                <!-- Analyze Button -->
                <button class="analyze-btn" id="analyzeBtn">🔍 Analyze Document</button>
            </div>
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const selectFileBtn = document.getElementById('selectFileBtn');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const removeFileBtn = document.getElementById('removeFileBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');

        let selectedFile = null;

        // Click to browse
        selectFileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });

        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        // File selected via input
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Drag and drop events
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // Handle the selected file
        function handleFile(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);

            // Set icon based on file type
            const icon = fileInfo.querySelector('.file-info-icon');
            if (file.type.startsWith('image/')) {
                icon.textContent = '🖼️';
            } else if (file.type === 'application/pdf') {
                icon.textContent = '📄';
            } else {
                icon.textContent = '📎';
            }

            fileInfo.classList.add('visible');
            analyzeBtn.classList.add('visible');
        }

        // Remove file
        removeFileBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('visible');
            analyzeBtn.classList.remove('visible');
        });

        // Analyze button
        analyzeBtn.addEventListener('click', () => {
            if (selectedFile) {
                console.log('Analyzing file:', selectedFile.name);
                analyzeBtn.textContent = '⏳ Analyzing...';
                analyzeBtn.disabled = true;
                analyzeBtn.style.opacity = '0.7';

                // Simulate analysis – replace with actual backend call
                setTimeout(() => {
                    alert('Analysis complete for: ' + selectedFile.name);
                    analyzeBtn.textContent = '🔍 Analyze Document';
                    analyzeBtn.disabled = false;
                    analyzeBtn.style.opacity = '1';
                }, 2000);
            }
        });

        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>

</html>
